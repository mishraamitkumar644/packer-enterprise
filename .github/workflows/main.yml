name: Platform Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'packer/**'
      - 'terraform/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:

# ---------------------------------------------------------------
# JOB 1 — Foundation
# Creates RG + SIG + image definitions.
# Terraform is idempotent — already exists? does nothing.
# ---------------------------------------------------------------

  foundation:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform/foundation
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - uses: hashicorp/setup-terraform@v3
      - run: terraform init
      - run: terraform plan  -state=/tmp/foundation.tfstate
      - run: terraform apply -state=/tmp/foundation.tfstate -auto-approve


# ---------------------------------------------------------------
# JOB 2 — Detect + Build + Deploy (single job, sequential steps)
# ---------------------------------------------------------------

  build-and-deploy:
    runs-on: ubuntu-latest
    needs: foundation

    env:
      RESOURCE_GROUP: rg-canada-prod
      GALLERY_NAME:   canadaProdSIG

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # ---------------------------------------------------------
      # STEP A — Detect which packer folders changed
      # ---------------------------------------------------------
      - name: Detect changed images
        id: detect
        run: |
          VERSION="1.$(date -u +'%Y%m%d').${{ github.run_number }}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            dirs=$(find packer -mindepth 1 -maxdepth 1 -type d | sort \
                   | jq -R -s -c 'split("\n") | map(select(length > 0))')
          else
            dirs=$(git diff --name-only HEAD~1 HEAD \
                   | grep '^packer/' | awk -F'/' '{print $1"/"$2}' | sort -u \
                   | jq -R -s -c 'split("\n") | map(select(length > 0))')
          fi

          count=$(echo "$dirs" | jq 'length')
          echo "dirs=${dirs}"   >> "$GITHUB_OUTPUT"
          echo "count=${count}" >> "$GITHUB_OUTPUT"
          echo "Detected ${count} changed image(s): ${dirs}"

      # ---------------------------------------------------------
      # STEP B — Debug: confirm .pkr.hcl file is present
      # Remove this step once pipeline is stable
      # ---------------------------------------------------------
      - name: Debug packer dir contents
        if: steps.detect.outputs.count != '0'
        run: |
          echo "=== Repo packer tree ==="
          find packer -type f | sort

      # ---------------------------------------------------------
      # STEP C — Packer build (skipped if nothing changed)
      # ---------------------------------------------------------
      - name: Setup Packer
        if: steps.detect.outputs.count != '0'
        uses: hashicorp/setup-packer@main

      - name: Packer init and build
        if: steps.detect.outputs.count != '0'
        env:
          PKR_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          PKR_VAR_tenant_id:       ${{ secrets.AZURE_TENANT_ID }}
          PKR_VAR_client_id:       ${{ secrets.AZURE_CLIENT_ID }}
          PKR_VAR_client_secret:   ${{ secrets.AZURE_CLIENT_SECRET }}
        run: |
          for dir in $(echo '${{ steps.detect.outputs.dirs }}' | jq -r '.[]'); do
            echo "========== Building: ${dir} =========="
            packer init "${dir}"
            packer build \
              -var="image_version=${{ steps.detect.outputs.version }}" \
              "${dir}"
          done

      # ---------------------------------------------------------
      # STEP D — Deploy VM with Terraform
      # Runs only when packer built at least one image.
      # Terraform is idempotent — VM exists? does nothing.
      # ---------------------------------------------------------
      - name: Setup Terraform
        if: steps.detect.outputs.count != '0'
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        if: steps.detect.outputs.count != '0'
        working-directory: terraform/vm
        run: terraform init

      - name: Terraform plan
        if: steps.detect.outputs.count != '0'
        working-directory: terraform/vm
        run: |
          terraform plan \
            -state=/tmp/vm.tfstate \
            -var="image_version=${{ steps.detect.outputs.version }}" \
            -var="ssh_public_key=${{ secrets.AZURE_VM_SSH_PUBLIC_KEY }}"

      - name: Terraform apply
        if: steps.detect.outputs.count != '0'
        working-directory: terraform/vm
        run: |
          terraform apply \
            -state=/tmp/vm.tfstate \
            -auto-approve \
            -var="image_version=${{ steps.detect.outputs.version }}" \
            -var="ssh_public_key=${{ secrets.AZURE_VM_SSH_PUBLIC_KEY }}"
