name: Enterprise Platform Pipeline

on:

  push:
    branches:
      - main
    paths:
      - 'terraform/**'
      - 'packer/**'

  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:

# =====================================================
# FOUNDATION  (Resource Group + Shared Image Gallery)
# =====================================================

  foundation:

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: terraform/foundation

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        # ARM_* variables supply credentials to the azurerm backend.
        # The backend initializes before the provider and reads its own
        # auth independently — without these it cannot construct the
        # OIDC token request and fails with 401.
        env:
          ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC:        "true"
        run: terraform init

      - name: Terraform Apply
        env:
          ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC:        "true"
        run: terraform apply -auto-approve

# =====================================================
# IMAGE DEFINITION  (SIG image definitions)
# =====================================================

  image-definition:

    needs: foundation

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: terraform/image-definition

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        env:
          ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC:        "true"
        run: terraform init

      - name: Terraform Apply
        env:
          ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC:        "true"
        run: terraform apply -auto-approve

# =====================================================
# DETECT CHANGED IMAGES
#
# Logic:
#   push              -> Only the packer/<image> folders that
#                        actually changed in this commit
#   workflow_dispatch -> All packer/<image> folders (full rebuild)
#
# Outputs:
#   matrix      -> {"dir":["packer/ubuntu-nginx","packer/xyz"]}
#   has_images  -> "true" | "false"
#   version     -> "1.YYYYMMDD.RUNNUMBER"
#                  e.g. 1.20250525.42
#
# Version format rationale:
#   Azure SIG enforces Major.Minor.Patch where each part must be a
#   32-bit unsigned integer (max 2,147,483,647).
#   - Major = 1  (fixed — increment manually for breaking changes)
#   - Minor = YYYYMMDD  (build date — max value 99991231, well
#             within the 2,147,483,647 limit)
#   - Patch = github.run_number  (auto-incrementing integer starting
#             at 1, unique per workflow, never overflows)
#   This scheme sorts chronologically and is unique across all runs.
# =====================================================

  detect-images:

    needs: image-definition

    runs-on: ubuntu-latest

    outputs:
      matrix:     ${{ steps.build-matrix.outputs.matrix }}
      has_images: ${{ steps.build-matrix.outputs.has_images }}
      version:    ${{ steps.build-matrix.outputs.version }}

    steps:

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Build Image Matrix
        id: build-matrix
        run: |
          # -- Build the image version for this pipeline run --------
          BUILD_DATE="$(date -u +'%Y%m%d')"
          RUN_NUMBER="${{ github.run_number }}"
          VERSION="1.${BUILD_DATE}.${RUN_NUMBER}"
          echo "Image version for this run: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          # -- workflow_dispatch: collect ALL packer image folders --
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual trigger — building ALL packer images"
            dirs=$(find packer -mindepth 1 -maxdepth 1 -type d \
                   | sort \
                   | jq -R -s -c 'split("\n") | map(select(length > 0))')
          else
          # -- push: collect only changed packer image folders ------
            echo "Push trigger — detecting changed packer images"
            dirs=$(git diff --name-only HEAD~1 HEAD \
                   | grep '^packer/' \
                   | cut -d'/' -f1-2 \
                   | sort -u \
                   | jq -R -s -c 'split("\n") | map(select(length > 0))')
          fi

          echo "Detected dirs: $dirs"

          # -- skip if nothing changed ------------------------------
          count=$(echo "$dirs" | jq 'length')
          if [ "$count" -eq 0 ]; then
            echo "No packer images to build"
            echo "matrix={\"dir\":[]}" >> "$GITHUB_OUTPUT"
            echo "has_images=false"    >> "$GITHUB_OUTPUT"
          else
            echo "matrix={\"dir\":$dirs}" >> "$GITHUB_OUTPUT"
            echo "has_images=true"        >> "$GITHUB_OUTPUT"
          fi

# =====================================================
# PACKER BUILD  (parallel — one job per changed image)
#
# The version from detect-images is passed to Packer as a variable.
# Every image built in this run shares the same version string.
# =====================================================

  packer-build:

    needs: detect-images

    if: needs.detect-images.outputs.has_images == 'true'

    runs-on: ubuntu-latest

    strategy:
      matrix: ${{ fromJson(needs.detect-images.outputs.matrix) }}
      fail-fast: false

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Packer
        uses: hashicorp/setup-packer@main

      - name: Packer Init
        working-directory: ${{ matrix.dir }}
        run: packer init .

      - name: Packer Validate
        working-directory: ${{ matrix.dir }}
        run: |
          packer validate \
            -var="image_version=${{ needs.detect-images.outputs.version }}" \
            .

      - name: Packer Build
        working-directory: ${{ matrix.dir }}
        run: |
          packer build \
            -var="image_version=${{ needs.detect-images.outputs.version }}" \
            .

# =====================================================
# VM DEPLOYMENT
# Deploys the VM pinned to the exact image version
# built by Packer in this pipeline run.
# =====================================================

  vm:

    needs:
      - detect-images
      - packer-build

    if: success()

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: terraform/vm

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        env:
          ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC:        "true"
        run: terraform init

      - name: Terraform Apply
        env:
          ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC:        "true"
        run: |
          terraform apply -auto-approve \
            -var="image_version=${{ needs.detect-images.outputs.version }}"
